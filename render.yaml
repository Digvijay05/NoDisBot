services:
  - type: web
    name: notion-discord-bot
    runtime: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /app/data
      - key: PREFIX
        value: "*"
      - key: TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
