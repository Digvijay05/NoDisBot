services:
  - type: worker
    name: notion-discord-bot
    runtime: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /app/data
      - key: PREFIX
        value: "!"
      - key: OLLAMA_URL
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: deepseek-v3.1:671b-cloud
      - key: TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DB_ID
        sync: false
      - key: OLLAMA_API
        sync: false
