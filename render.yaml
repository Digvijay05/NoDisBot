services:
  - type: worker
    name: notion-discord-bot
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: bot-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /app/data
      - key: PREFIX
        value: "*"
      - key: TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
